name: Byg og Deploy React App til Simply.com

on:
  push:
    branches:
      - main # Kører hver gang du pusher til 'main' branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Hent kildekode
      uses: actions/checkout@v3

    - name: Opsæt Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18 # Matcher din React 18+ version
        cache: 'npm'

    - name: Installer dependencies
      run: npm install

    - name: Byg projektet (Vite)
      run: npm run build
      # Hvis du bruger hemmelige miljøvariabler, kan de tilføjes herunder:
      # env:
      #   VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      #   VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      #   VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      #   VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      #   VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      #   VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

    - name: Synkroniser 'dist' mappen til Simply.com via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/ # Vite lægger de færdige filer i 'dist' mappen
        server-dir: /public_html/ # Sender dem direkte til roden af dit webhotel
