name: Byg og Deploy React App til Simply.com

on:
  push:
    branches:
      - main # Kører hver gang du pusher til 'main' branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Hent kildekode
      uses: actions/checkout@v4

    - name: Opsæt Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20 # Bliver automatisk håndteret af v4 bedre
        cache: 'npm'

    - name: Installer dependencies
      run: |
        rm -rf node_modules package-lock.json
        npm install

    - name: Byg projektet (Vite)
      run: npm run build
      # Hvis du bruger hemmelige miljøvariabler, kan de tilføjes herunder:
      # env:
      #   VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      #   VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      #   VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      #   VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      #   VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      #   VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

    - name: Synkroniser 'dist' mappen til Simply.com via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftps # <- VIGTIGT: Brug sikker FTPS, da Simply.com nogle gange blokerer data-forbindelsen for plain FTP fra Github
        port: 21
        local-dir: ./dist/ # Vite lægger de færdige filer i 'dist' mappen
        server-dir: /livescore/ # Sender dem til livescore mappen (på samme niveau som public_html)
